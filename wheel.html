<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎡 عجلة الحب والقدر</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* تنسيق خاص للعجلة لتكون داخل الحاوية الموحدة */
        #wheel {
            margin: 20px auto;
            display: block;
        }
        .wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🎡 عجلة الحب والقدر</h1>
        <p>أدر العجلة لتكتشف نصيبك الجميل اليوم ❤️</p>

        <div class="wheel-container">
            <canvas id="wheel" width="320" height="320"></canvas>
            <button id="spin" class="btn">🎯 أدر العجلة الآن</button>
        </div>

        <div id="result" style="font-size: 1.5rem; color: #d63384; font-weight: bold; margin-top: 20px;"></div>

        <a href="index.html" class="back">🏠 العودة إلى الرئيسية</a>
    </div>

    <script src="wheel.js"></script>
</body>
</html>
