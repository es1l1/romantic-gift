<!DOCTYPE html>
<html>
<head>
<style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #ffe6e6; font-family: sans-serif; }
    .heart { color: red; font-size: 100px; animation: beat 1s infinite; }
    @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
</style>
</head>
<body>
    <div class="heart">❤️</div>
    <h1 style="color: #d11d1d; margin-left: 20px;">أحبك كثيراً!</h1>
</body>
</html>
