<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ لعبة الحب ❤️</title>

<style>

body{
margin:0;
font-family:tahoma;
background:linear-gradient(135deg,#ff4f95,#ff77b7);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

.card{
width:90%;
max-width:500px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:25px;
border-radius:25px;
text-align:center;
color:white;
}

h1{
margin-top:0;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
cursor:pointer;
font-size:18px;
margin:5px;
}

#yesBtn{
background:#ff1744;
color:white;
}

#noBtn{
position:absolute;
background:#444;
color:white;
}

#wheel{
margin-top:20px;
padding:15px;
background:white;
color:#ff1744;
border-radius:15px;
font-size:22px;
font-weight:bold;
}

#questionBox{
margin-top:20px;
font-size:20px;
}

#level{
font-size:22px;
margin:10px 0;
}

#message{
margin-top:10px;
font-size:20px;
min-height:60px;
}

.heart{
position:fixed;
font-size:25px;
animation:fly 3s linear forwards;
pointer-events:none;
}

@keyframes fly{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-100vh);
opacity:0;
}
}

</style>
</head>
<body>

<div class="card">

<h1>❤️ لعبة الحب ❤️</h1>

<div id="score">
نقاط الحب: 0
</div>

<div id="level">
المستوى 1
</div>

<div id="message">
اضغطي أحبك لبدء المغامرة ❤️
</div>

<button id="yesBtn">أحبك ❤️</button>
<button id="noBtn">لا 💔</button>

<hr>

<h2>🎡 عجلة الحظ</h2>

<div id="wheel">
اضغطي للدوران
</div>

<button onclick="spinWheel()">
لف العجلة
</button>

<hr>

<h2>❓ سؤال رومانسي</h2>

<div id="questionBox">
اضغطي السؤال
</div>

<button onclick="nextQuestion()">
سؤال جديد
</button>

</div>

<script>

let points=0;

const score=document.getElementById("score");
const level=document.getElementById("level");
const message=document.getElementById("message");

const levels=[
"بداية الحب ❤️",
"إعجاب كبير 💕",
"اشتياق دائم 💖",
"حب مجنون 💘",
"ملكة القلب 👑"
];

const levelMessages=[
"أنت أجمل شيء بحياتي",
"كل يوم أحبك أكثر",
"وجودك سعادة",
"قلبي لا يعرف غيرك",
"أنتِ كل شيء بالنسبة لي"
];

document.getElementById("yesBtn")
.addEventListener("click",()=>{

points++;

score.innerHTML=
"نقاط الحب: "+points;

let currentLevel=
Math.min(
Math.floor(points/5),
levels.length-1
);

level.innerHTML=
levels[currentLevel];

message.innerHTML=
levelMessages[currentLevel];

createHearts(10);

});

const noBtn=
document.getElementById("noBtn");

function moveNo(){

const x=
Math.random()*
(window.innerWidth-120);

const y=
Math.random()*
(window.innerHeight-80);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

}

noBtn.addEventListener("mouseenter",moveNo);

noBtn.addEventListener("touchstart",(e)=>{
e.preventDefault();
moveNo();
});

const prizes=[
"🌹 وردة حب",
"💌 رسالة سرية",
"💍 خاتم رمزي",
"❤️ 5 نقاط حب",
"😘 قبلة افتراضية",
"👑 لقب ملكة القلب"
];

function spinWheel(){

const result=
prizes[
Math.floor(
Math.random()*prizes.length
)
];

document.getElementById("wheel")
.innerHTML=result;

createHearts(15);

}

const questions=[

{
q:"من الأجمل؟",
a:"أكيد أنتِ ❤️"
},

{
q:"من ساكن القلب؟",
a:"أنتِ فقط 💕"
},

{
q:"هل يوجد أجمل منك؟",
a:"مستحيل 😍"
},

{
q:"من يجعل يومي سعيداً؟",
a:"أنتِ 🌹"
}

];

function nextQuestion(){

const item=
questions[
Math.floor(
Math.random()*questions.length
)
];

document.getElementById("questionBox")
.innerHTML=
item.q+"<br><br>"+item.a;

createHearts(8);

}

function createHearts(count){

for(let i=0;i<count;i++){

const h=
document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=
Math.random()*100+"vw";

h.style.bottom="0";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},3000);

}

}

</script>

</body>
</html>
