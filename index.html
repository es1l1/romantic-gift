<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ رسالة حب ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Tahoma,sans-serif;
    background:linear-gradient(135deg,#ff5fa2,#ff7ac6,#ff4da6);
    position:relative;
}

/* خلفية نقاط */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:radial-gradient(rgba(255,255,255,.3) 2px, transparent 2px);
    background-size:40px 40px;
    animation:bgMove 20s linear infinite;
}

@keyframes bgMove{
    from{transform:translate(0,0);}
    to{transform:translate(-100px,-100px);}
}

.card{
    position:relative;
    z-index:10;
    width:90%;
    max-width:520px;
    padding:35px;
    border-radius:30px;
    text-align:center;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,.18);
    box-shadow:0 10px 40px rgba(0,0,0,.15);
}

.heart{
    font-size:110px;
    cursor:pointer;
    user-select:none;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.18);}
}

.title{
    color:white;
    font-size:40px;
    margin-top:10px;
}

.message{
    color:white;
    margin-top:15px;
    min-height:60px;
    font-size:22px;
}

.counter{
    color:white;
    margin-top:15px;
    font-size:18px;
}

.question{
    color:white;
    margin-top:25px;
    font-size:30px;
    font-weight:bold;
}

.buttons{
    position:relative;
    height:220px;
    margin-top:25px;
}

button{
    border:none;
    border-radius:50px;
    padding:15px 35px;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

#yesBtn{
    background:linear-gradient(45deg,#ff1744,#ff5f9e);
    color:white;
    box-shadow:0 0 25px rgba(255,0,100,.5);
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    position:absolute;
    left:50%;
    top:100px;
    transform:translateX(-50%);
    background:#555;
    color:white;
}

.result{
    color:white;
    margin-top:20px;
    font-size:30px;
    font-weight:bold;
    min-height:60px;
}

.floating-heart{
    position:fixed;
    pointer-events:none;
    animation:fly 4s linear forwards;
    z-index:9999;
}

@keyframes fly{
    0%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    100%{
        opacity:0;
        transform:translateY(-120vh) scale(2);
    }
}

.sparkle{
    position:absolute;
    color:white;
    animation:sparkle 2s infinite;
}

@keyframes sparkle{
    50%{
        transform:scale(1.5);
        opacity:.4;
    }
}
</style>
</head>

<body>

<div class="card">

    <div id="heart" class="heart">❤️</div>

    <h1 class="title">أحبك كثيراً</h1>

    <div id="message" class="message">
        اضغط على القلب ❤️
    </div>

    <div id="counter" class="counter">
        عدد النبضات: 0
    </div>

    <div class="question">
        هل تحبني؟ 🥺❤️
    </div>

    <div class="buttons">
        <button id="yesBtn">نعم أحبك ❤️</button>
        <button id="noBtn">لا 💔</button>
    </div>

    <div id="result" class="result"></div>

</div>

<script>

const heart = document.getElementById("heart");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const counter = document.getElementById("counter");
const message = document.getElementById("message");
const result = document.getElementById("result");

let clicks = 0;

const messages = [
"أنت أجمل شخص في حياتي ❤️",
"كل نبضة من قلبي تنادي باسمك 💖",
"وجودك يجعل أيامي أجمل 🌹",
"أحبك أكثر من الأمس وأقل من الغد ❤️",
"أنت سعادتي وراحتي 💕",
"أنت أجمل هدية من القدر 💘",
"قلبي اختارك دون تردد ❤️"
];

function updateCounter(){
    clicks++;
    counter.textContent = "عدد النبضات: " + clicks;
}

heart.addEventListener("click",()=>{

    updateCounter();

    message.textContent =
    messages[Math.floor(Math.random()*messages.length)];

    createHeartRain(8);
});

yesBtn.addEventListener("click",()=>{

    updateCounter();

    result.innerHTML =
    "🥰 كنت أعلم ذلك! أحبك أكثر مما تتخيل ❤️";

    yesBtn.style.transform = "scale(1.15)";

    createHeartRain(80);
});

function moveNoButton(){

    const container =
    document.querySelector(".buttons");

    const maxX =
    container.clientWidth -
    noBtn.offsetWidth;

    const maxY =
    container.clientHeight -
    noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseenter", moveNoButton);

noBtn.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveNoButton();
});

document.addEventListener("touchmove", function(e){

    const touch = e.touches[0];
    const rect = noBtn.getBoundingClientRect();

    const centerX = rect.left + rect.width/2;
    const centerY = rect.top + rect.height/2;

    const distance = Math.hypot(
        touch.clientX - centerX,
        touch.clientY - centerY
    );

    if(distance < 100){
        moveNoButton();
    }
});

function createHeartRain(count){

    const hearts = ["❤️","💖","💕","💘","💝"];

    for(let i=0;i<count;i++){

        const h = document.createElement("div");

        h.className = "floating-heart";

        h.innerHTML =
        hearts[Math.floor(Math.random()*hearts.length)];

        h.style.left =
        Math.random()*100 + "vw";

        h.style.top = "100vh";

        h.style.fontSize =
        (20 + Math.random()*40) + "px";

        document.body.appendChild(h);

        setTimeout(()=>{
            h.remove();
        },4000);
    }
}

setInterval(()=>{
    createHeartRain(1);
},1500);

for(let i=0;i<25;i++){

    const star = document.createElement("div");

    star.className = "sparkle";
    star.innerHTML = "✨";

    star.style.left = Math.random()*100 + "vw";
    star.style.top = Math.random()*100 + "vh";

    star.style.fontSize =
    (10 + Math.random()*20) + "px";

    star.style.animationDelay =
    Math.random()*2 + "s";

    document.body.appendChild(star);
}

</script>

</body>
</html>
