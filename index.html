<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ أحبك كثيراً ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Tahoma,sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#ff5f9e,#ff77b7,#ff4f95);
position:relative;
}

/* خلفية ناعمة */
body::before{
content:"";
position:absolute;
inset:0;
background-image:
radial-gradient(rgba(255,255,255,.25) 1.5px,transparent 1.5px);
background-size:40px 40px;
opacity:.4;
}

.card{
position:relative;
z-index:2;
width:90%;
max-width:500px;
padding:30px;
border-radius:30px;
text-align:center;
background:rgba(255,255,255,.18);
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.heart{
font-size:100px;
cursor:pointer;
user-select:none;
animation:beat 1s infinite;
}

@keyframes beat{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.15);
}
}

h1{
color:white;
font-size:38px;
margin-top:10px;
}

.message{
color:white;
font-size:22px;
margin-top:15px;
min-height:60px;
}

.counter{
margin-top:10px;
color:white;
font-size:18px;
}

.question{
margin-top:25px;
font-size:28px;
font-weight:bold;
color:white;
}

.buttons{
position:relative;
height:180px;
margin-top:20px;
}

button{
border:none;
padding:15px 30px;
border-radius:50px;
font-size:20px;
cursor:pointer;
transition:.25s;
}

#yesBtn{
background:linear-gradient(45deg,#ff1744,#ff5f9e);
color:white;
box-shadow:0 0 15px rgba(255,0,100,.35);
}

#yesBtn:hover{
transform:scale(1.05);
}

#noBtn{
position:absolute;
left:50%;
top:90px;
transform:translateX(-50%);
background:#555;
color:white;
}

.result{
margin-top:15px;
font-size:28px;
font-weight:bold;
color:white;
min-height:60px;
}

.floating-heart{
position:fixed;
pointer-events:none;
z-index:9999;
animation:floatUp 3s linear forwards;
will-change:transform,opacity;
}

@keyframes floatUp{
from{
transform:translateY(0) scale(1);
opacity:1;
}
to{
transform:translateY(-100vh) scale(1.8);
opacity:0;
}
}
</style>
</head>

<body>

<div class="card">

<div id="heart" class="heart">❤️</div>

<h1>أحبك كثيراً</h1>

<div id="message" class="message">
اضغط على القلب ❤️
</div>

<div id="counter" class="counter">
عدد النبضات: 0
</div>

<div class="question">
هل تحبني؟ 🥺❤️
</div>

<div class="buttons">
<button id="yesBtn">نعم أحبك ❤️</button>
<button id="noBtn">لا 💔</button>
</div>

<div id="result" class="result"></div>

</div>

<script>

const heart = document.getElementById("heart");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");
const counter = document.getElementById("counter");
const result = document.getElementById("result");

let clicks = 0;

const messages = [
"أنت أجمل شيء حدث في حياتي ❤️",
"كل نبضة في قلبي تنادي باسمك 💖",
"وجودك يجعل الحياة أجمل 🌹",
"أحبك أكثر كل يوم 💕",
"أنت سعادتي وراحتي 💘",
"قلبي اختارك دون تردد ❤️"
];

function updateCounter(){
clicks++;
counter.textContent = "عدد النبضات: " + clicks;
}

heart.addEventListener("click",()=>{

updateCounter();

message.textContent =
messages[Math.floor(Math.random()*messages.length)];

createHearts(6);

});

yesBtn.addEventListener("click",()=>{

updateCounter();

result.innerHTML =
"🥰 كنت أعلم ذلك! أحبك أكثر مما تتخيل ❤️";

createHearts(15);

yesBtn.style.transform="scale(1.08)";
setTimeout(()=>{
yesBtn.style.transform="scale(1)";
},300);

});

/* زر لا يهرب */

function moveNoButton(){

const area =
document.querySelector(".buttons");

const maxX =
area.clientWidth - noBtn.offsetWidth;

const maxY =
area.clientHeight - noBtn.offsetHeight;

const x = Math.random()*maxX;
const y = Math.random()*maxY;

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseenter",moveNoButton);

noBtn.addEventListener("touchstart",(e)=>{
e.preventDefault();
moveNoButton();
});

/* قلوب خفيفة */

function createHearts(count){

const icons=["❤️","💖","💕","💘"];

for(let i=0;i<count;i++){

const h=document.createElement("div");

h.className="floating-heart";

h.textContent=
icons[Math.floor(Math.random()*icons.length)];

h.style.left=
Math.random()*100+"vw";

h.style.bottom="0";

h.style.fontSize=
(18+Math.random()*20)+"px";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},3000);

}
}

/* قلب كل 6 ثواني فقط */

setInterval(()=>{
createHearts(1);
},6000);

</script>

</body>
</html>
