<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ اختبار الحب والقلوب</title>
    <style>
        /* تنسيقات الجمال والرومانسية */
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff0f6, #fce7f3);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(255, 79, 149, 0.25);
            text-align: center;
            width: 100%;
            max-width: 500px;
            border: 2px solid #ff8fcf;
        }

        h1 {
            color: #d63384;
            font-size: 2rem;
            margin-bottom: 30px;
        }

        #question {
            color: #4a044e;
            font-size: 1.4rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        #answers {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .answer-btn {
            background: #fff5f8;
            border: 2px solid #ffadd2;
            padding: 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.1rem;
            color: #be185d;
            transition: all 0.3s ease;
        }

        .answer-btn:hover {
            background: #ff8fcf;
            color: white;
            transform: scale(1.02);
        }

        #score {
            font-size: 1.5rem;
            color: #d63384;
            font-weight: bold;
            margin-top: 20px;
        }

        .back {
            display: inline-block;
            margin-top: 30px;
            color: #ff4f95;
            text-decoration: none;
            font-weight: bold;
            opacity: 0.8;
            transition: 0.3s;
        }

        .back:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="game-container">
        <h1>❤️ اختبار الحب</h1>

        <div id="quiz">
            <h2 id="question">سؤال الحب ينتظرك...</h2>
            <div id="answers">
                <!-- الأزرار ستضاف هنا عبر الجافا سكريبت -->
            </div>
        </div>

        <div id="score"></div>

        <a href="index.html" class="back">🏠 العودة للرئيسية</a>
    </div>

    <script src="app.js"></script>
    <script src="questions.js"></script>
</body>
</html>
